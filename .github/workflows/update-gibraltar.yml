name: Actualizar Gibraltar Watch

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gibraltar-watch
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Ejecutar pruebas del monitor actual
        run: python -m unittest -v test_update.py

      - name: Ejecutar pruebas de Gibraltar Watch TOP
        run: python -m unittest -v test_gibraltar_top.py test_install_gibraltar_top.py

      - name: Actualizar sismicidad
        run: python update_gibraltar.py

      - name: Instalar y conservar mejoras editoriales
        run: python install_gibraltar_top.py

      - name: Generar parte científico y archivo
        run: python generate_gibraltar_brief.py

      - name: Guardar cambios
        id: commit
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No hay cambios que guardar."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Actualizar Gibraltar Watch y parte científico"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Avisar mediante IndexNow
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        run: python submit_gibraltar_indexnow.py
